name: E2E Tests After Deploy

on:
  repository_dispatch:
    types: [ e2e-tests ]
  workflow_dispatch:
    inputs:
      snapshot_version:
        description: "Snapshot version to test (fallback for manual runs)"
        required: true

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Maven Environment
        uses: CyborgCodeSyndicate/utilities/pipelines/shared/setup-maven@v1.3.2
        with:
          java_version: "17"
          server_ids: github-roa-libraries,github-roa-plugins
          github_packages_user: ${{ secrets.GH_PACKAGES_USER }}
          github_packages_token: ${{ secrets.GH_PACKAGES_PAT }}

      - name: Determine snapshot version
        id: vars
        shell: bash
        run: |
          SNAP="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.snapshot_version || github.event.inputs.snapshot_version }}"
          if [[ -z "$SNAP" ]]; then
            echo "❌ No snapshot_version provided via repository_dispatch or workflow_dispatch" >&2
            exit 1
          fi
          echo "snapshot_version=$SNAP" >> "$GITHUB_OUTPUT"
          echo "SNAPSHOT_VERSION=$SNAP" >> "$GITHUB_ENV"
          echo "Using snapshot version: $SNAP"

      - name: Update parent version to snapshot
        shell: bash
        run: |
          echo "📝 Setting parent version to: ${SNAPSHOT_VERSION}"
          mvn -B -ntp versions:update-parent \
            -DparentVersion="[${SNAPSHOT_VERSION}]" \
            -DallowSnapshots=true \
            -DgenerateBackupPoms=false \
            --no-transfer-progress

      - name: Compile
        shell: bash
        run: mvn -B -q -U -DskipTests -pl ui-complex-test-framework -am compile --no-transfer-progress

      - name: Run Sanity tests (non-blocking)
        shell: bash
        continue-on-error: true
        run: mvn -B -q -U -pl ui-complex-test-framework -am test -Dinclude.tags=Sanity -Djunit.jupiter.tags=Sanity --no-transfer-progress

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### E2E Test Run"
            echo ""
            echo "- Snapshot version: ${SNAPSHOT_VERSION}"
            echo "- Source repo: ${{ github.event.client_payload.source_repo || 'manual' }}"
            echo "- Source SHA: ${{ github.event.client_payload.source_sha || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"
