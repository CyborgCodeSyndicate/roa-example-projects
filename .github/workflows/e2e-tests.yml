name: E2E Tests After Deploy

on:
  workflow_call:
    inputs:
      snapshot_version:
        description: "Snapshot version to test"
        required: true
        type: string
    secrets:
      gh_packages_user:
        required: true
      gh_packages_pat:
        required: true

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          repository: CyborgCodeSyndicate/roa-example-projects
#          ref: ${{ inputs.testRepoRef }}
#          token: ${{ secrets.GITHUB_TOKEN }}
#          path: temp-project

      - name: Setup Maven Environment
        uses: CyborgCodeSyndicate/utilities/pipelines/shared/setup-maven@v1.3.2
        with:
          server_ids: github-roa-libraries,github-roa-plugins
          github_packages_user: ${{ secrets.gh_packages_user }}
          github_packages_token: ${{ secrets.gh_packages_pat }}

      - name: Override parent version (optional)
        if: ${{ inputs.snapshot_version != '' }}
#        run: |
#          echo "📝 Setting parent version to: ${{ inputs.snapshot_version }}"
#          MODULES=$(mvn -q help:evaluate -Dexpression=project.modules -DforceStdout | sed -e 's/[][]//g' -e 's/, */,/g')
#          echo "Detected modules: $MODULES"
#          mvn -B -ntp -pl "$MODULES" versions:update-parent \
#            -DparentVersion="[${{ inputs.snapshot_version }}]" \
#            -DallowSnapshots=true \
#            -DgenerateBackupPoms=false \
#            --no-transfer-progress
        run: |
          echo "📝 Setting parent version to: ${{ inputs.snapshot_version }}"
          mvn -B -ntp versions:update-parent \
            -DparentVersion="[${{ inputs.snapshot_version }}]" \
            -DallowSnapshots=true \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false \
            --no-transfer-progress  

      - name: Verify compile (fail fast if broken)
        run: |
          mvn -ntp -U compile
      

  run:
    needs: setup
    uses: CyborgCodeSyndicate/roa-github-workflows/.github/workflows/roa-tests.yml@e2e-flow
    with:
      kind: api
      project_module: api-test-framework
      tags_include: Smoke
      # parent_version_override: ${{ inputs.snapshot_version }}
      # optional: tune threads or profiles if needed
      # junit_threads_per_job: 5
      # test_profiles: e2e
      repository: CyborgCodeSyndicate/roa-example-projects
    secrets:
      maven_user: ${{ secrets.gh_packages_user }}
      maven_token: ${{ secrets.gh_packages_pat }}