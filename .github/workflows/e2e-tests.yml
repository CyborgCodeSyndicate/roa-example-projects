name: E2E Tests After Deploy

on:
  workflow_call:
    inputs:
      snapshot_version:
        description: "Snapshot version to test"
        required: true
        type: string

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          repository: CyborgCodeSyndicate/roa-example-projects
#          ref: ${{ inputs.testRepoRef }}
#          token: ${{ secrets.GITHUB_TOKEN }}
#          path: temp-project
  run:
    uses: CyborgCodeSyndicate/roa-github-workflows/.github/workflows/roa-tests.yml@v1.0.1
    with:
      kind: ui
      project_module: ui-complex-test-framework
      tags_include: Smoke
      #parent_version_override: ${{ inputs.snapshot_version }}
      # optional: tune threads or profiles if needed
      # junit_threads_per_job: 5
      # test_profiles: e2e
    secrets:
      maven_user:  ${{ secrets.GH_PACKAGES_USER }}
      maven_token: ${{ secrets.GH_PACKAGES_PAT }}
